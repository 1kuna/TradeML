model: ridge
challenger: lightgbm

target: universe_relative_5d

modeling:
  feature_store:
    enabled: true
  feature_set: daily_price_liquidity_v1
  feature_version: price_liquidity_v1
  label_version: universe_relative_forward_return_v1
  label_horizons: [1, 5, 20]
  primary_label_horizon: 5
  label_horizon: 5
  label_definition: universe_relative_forward_return

data:
  dependencies: [equities_ohlcv_adj]
  green_threshold: 0.98
  window_years: 5

features:
  price:
    momentum: [5, 20, 60, 126]
    reversal: [1, 5]
    drawdown: [20, 60]
    gap: [overnight]
  volatility:
    realized: [20, 60]
    idiosyncratic: [60]
  liquidity:
    adv_dollar: [20]
    amihud: [20]
  controls:
    log_price: true
    log_market_cap: false

preprocessing:
  method: rank_normalize
  missing_threshold: 0.30
  missing_fill: cross_sectional_median

validation:
  primary: expanding_walk_forward
  initial_train_years: 2
  step: 3_months
  secondary: [cpcv, pbo, dsr]
  cpcv_folds: 8
  embargo_days: 10
  additional: [ic_by_year, ic_by_sector, placebo, cost_stress]
  portfolio_profiles: [equal_weight_top_quintile, cost_aware_long_only_v1]
  negative_controls:
    require_negative_controls: true
    max_abs_negative_control_ic: 0.10
    max_abs_future_news_leak_ic: 0.10
    max_single_feature_score_drop: 0.75
    min_feature_ablation_score_ratio: 0.25

portfolio:
  method: equal_weight_top_quintile
  portfolio_profile: equal_weight_top_quintile
  rebalance: weekly
  hedge: none
  cost_spread_bps: 5
  cost_stress_multiplier: 2.0
  max_single_name_weight: 0.02
  min_adv_dollar: 0.0
