program_id: perpetual-macmini
target: local
ssot_phase_order:
  - 1
  - 2
default_ssot_phase: 1
default_campaign_track: baseline
report_date_policy: phase1_freeze
max_concurrent: 1
budget_policy:
  max_total_runs: 5000
  max_total_hours: 720
  max_consecutive_non_improving_families: 8
  max_repeat_rejection_reason: 8
  max_low_novelty_families: 6
  min_novelty_score: 0.25
  max_infra_failures: 3
review_policy:
  cadence_hours: 12
incumbent_policy:
  mode: research
  manual_live_required: true
  max_pbo: 0.5
  min_net_return: 0.0
  min_rank_ic_improvement: 0.002
  min_net_return_improvement: 0.01
drift_policy:
  min_coverage: 0.98
  mature_windows: 3
  min_relative_ic: 0.5
  psi_warn: 0.2
  max_infra_failures: 3
  max_hours_without_completed_run: 24
alert_policy:
  cadence_hours: 168
  email_enabled: true
  write_files: true
paper_policy:
  enabled: true
  rebalance_day: FRI
  output_root: control/cluster/state/research/paper
  portfolio_notional: 100000.0
  no_live_orders: true
  evidence:
    min_mature_net_return: 0.0
    min_mature_excess_return: -1.0
    max_backtest_paper_gap: 0.05
    max_mature_drawdown: 0.05
    max_mature_turnover: 2.0
  broker:
    provider: alpaca_paper
    base_url: https://paper-api.alpaca.markets/v2
    submit_orders_enabled: false
    api_key_env: ALPACA_API_KEY
    api_secret_env: ALPACA_API_SECRET
modeling:
  feature_store:
    enabled: true
  feature_set: daily_price_liquidity_v1
  feature_version: news_event_aggregates_v1
  feature_versions:
    - price_liquidity_v1
    - sec_filing_events_v1
    - news_event_aggregates_v1
    - minute_daily_aggregates_v1
    - multi_source_daily_v1
  label_version: universe_relative_forward_return_v1
  label_horizons: [1, 5, 20]
  primary_label_horizon: 5
  label_definition: universe_relative_forward_return
architecture_registry_policy:
  enabled: true
objective_policy:
  enabled: true
  primary: research_profitability_v1
  complexity_penalty:
    enabled: true
    penalty_per_tier: 0.0005
    min_complexity_adjusted_improvement: 0.0
  promotion_metrics:
    - rank_ic
    - net_return
    - cost_stress_net_return
    - pbo
    - yearly_positivity
    - drawdown
    - turnover
validation:
  negative_controls:
    require_negative_controls: true
    max_abs_negative_control_ic: 0.10
    max_abs_future_news_leak_ic: 0.10
    max_single_feature_score_drop: 0.75
    min_feature_ablation_score_ratio: 0.25
autonomous_progression_policy:
  enabled: true
  disabled_future_lanes:
    - rl_policy
    - sequence_transformer
    - gnn
    - foundation_forecaster
diagnostic_planner_policy:
  enabled: true
  weak_plateau_min_rejections: 10
  weak_plateau_mode: weak_rejection_plateau
  weak_plateau_architectures:
    - linear_baseline
    - tree_challenger
    - advanced_challenger
  weak_plateau_feature_families:
    - price_core
    - volatility_removed
    - price_plus_news
  weak_plateau_data_profiles:
    - phase1_short_window
    - phase1_default
    - phase1_long_window
  weak_plateau_horizons:
    - 1
    - 5
    - 20
  strong_rejected_classes:
    - strong_robustness_failed
    - strong_unstable
    - strong_overfit_risk
    - strong_cost_failed
  suppress_duplicates_on:
    - feature_version
    - label_version
    - data_revision
    - objective_policy
feature_group_isolation_policy:
  enabled: true
  families:
    - price_core
    - volatility_removed
    - news_aggregates_only
    - price_plus_news
    - price_plus_news_no_fragile
frontier_architecture_policy:
  enabled: true
  allow_phase1_advanced: true
  trigger_min_completed_runs: 100
  advanced_first: true
  family_size_cap: 6
  sentinel_baseline_runs: 2
  max_advanced_failures_per_epoch: 12
  require_dependency_preflight: true
  auto_pivot_on_brake: true
steering_defaults:
  exploration_breadth: normal
search_policy:
  exhaustion_mode: wait_for_new_data
  allowed_dimensions:
    - architecture_family
    - feature_family
    - data_family
    - label_horizon
    - validation.initial_train_years
    - data_profile
ssot_phase_policies:
  "1":
    ssot_phase: 1
    campaign_track: baseline
    auto_unlock: true
    allowed_dimensions:
      - architecture_family
      - feature_family
      - data_family
      - label_horizon
      - validation.initial_train_years
      - data_profile
    allowed_data_families:
      - price_only
      - price_plus_liquidity
    family_size_cap: 6
    max_generations: 100
    max_phase_runs: 2500
    max_phase_hours: 480
    unlock_gate:
      require_shortlist: true
      require_cost_positive: true
    initial_matrix:
      architecture_family:
        - linear_baseline
        - tree_challenger
      feature_family:
        - price_core
        - price_liquidity
        - price_short_horizon
      data_family:
        - price_only
        - price_plus_liquidity
      label_horizon:
        - 5
      validation.initial_train_years:
        - 2
      data_profile:
        - phase1_default
        - phase1_short_window
    predictive_gate:
      min_rank_ic: 0.01
      require_go_decision: true
      require_all_years_positive: true
      max_abs_placebo_ic: 0.10
      min_cost_stress_net_return: 0.0
    backtest_gate:
      min_net_return: 0.0
      require_cost_positive: true
    backtest_profile:
      name: phase1_primary
  "2":
    ssot_phase: 2
    campaign_track: phase2_free_data
    auto_unlock: false
    allowed_dimensions:
      - architecture_family
      - feature_family
      - data_family
      - label_horizon
      - validation.initial_train_years
      - data_profile
    allowed_data_families:
      - price_only
      - price_plus_liquidity
      - price_plus_macro
      - price_plus_events
      - price_plus_news
    family_size_cap: 4
    max_generations: 60
    max_phase_runs: 1500
    max_phase_hours: 240
    unlock_gate:
      require_shortlist: true
      require_cost_positive: true
    initial_matrix:
      architecture_family:
        - linear_baseline
        - tree_challenger
        - advanced_challenger
        - ensemble_meta
      feature_family:
        - price_core
        - price_liquidity
        - price_short_horizon
      data_family:
        - price_only
        - price_plus_liquidity
      label_horizon:
        - 5
      validation.initial_train_years:
        - 2
        - 3
      data_profile:
        - phase1_default
        - phase1_long_window
    predictive_gate:
      min_rank_ic: 0.01
      require_go_decision: true
      require_all_years_positive: true
      max_abs_placebo_ic: 0.10
      min_cost_stress_net_return: 0.0
    backtest_gate:
      min_net_return: 0.0
      require_cost_positive: true
    backtest_profile:
      name: phase2_free_data
