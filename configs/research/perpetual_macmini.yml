program_id: perpetual-macmini
target: workstation-remote
ssot_phase_order:
  - 1
  - 2
default_ssot_phase: 1
default_campaign_track: baseline
report_date_policy: phase1_freeze
max_concurrent: 1
budget_policy:
  max_total_runs: 5000
  max_total_hours: 720
  max_consecutive_non_improving_families: 8
  max_repeat_rejection_reason: 8
  max_low_novelty_families: 6
  min_novelty_score: 0.25
  max_infra_failures: 3
review_policy:
  cadence_hours: 12
steering_defaults:
  exploration_breadth: normal
search_policy:
  exhaustion_mode: wait_for_new_data
  allowed_dimensions:
    - architecture_family
    - feature_family
    - data_family
    - validation.initial_train_years
    - data_profile
ssot_phase_policies:
  "1":
    ssot_phase: 1
    campaign_track: baseline
    auto_unlock: true
    allowed_dimensions:
      - architecture_family
      - feature_family
      - data_family
      - validation.initial_train_years
      - data_profile
    allowed_data_families:
      - price_only
      - price_plus_liquidity
    family_size_cap: 6
    max_generations: 100
    max_phase_runs: 2500
    max_phase_hours: 480
    unlock_gate:
      require_shortlist: true
      require_cost_positive: true
    initial_matrix:
      architecture_family:
        - linear_baseline
        - tree_challenger
      feature_family:
        - price_core
        - price_liquidity
        - price_short_horizon
      data_family:
        - price_only
        - price_plus_liquidity
      validation.initial_train_years:
        - 2
      data_profile:
        - phase1_default
        - phase1_short_window
    predictive_gate:
      min_rank_ic: 0.01
      require_go_decision: true
      require_all_years_positive: true
      max_abs_placebo_ic: 0.10
      min_cost_stress_net_return: 0.0
    backtest_gate:
      min_net_return: 0.0
      require_cost_positive: true
    backtest_profile:
      name: phase1_primary
  "2":
    ssot_phase: 2
    campaign_track: phase2_free_data
    auto_unlock: false
    allowed_dimensions:
      - architecture_family
      - feature_family
      - data_family
      - validation.initial_train_years
      - data_profile
    allowed_data_families:
      - price_only
      - price_plus_liquidity
      - price_plus_macro
      - price_plus_events
      - price_plus_news
    family_size_cap: 4
    max_generations: 60
    max_phase_runs: 1500
    max_phase_hours: 240
    unlock_gate:
      require_shortlist: true
      require_cost_positive: true
    initial_matrix:
      architecture_family:
        - linear_baseline
        - tree_challenger
        - advanced_challenger
      feature_family:
        - price_core
        - price_liquidity
        - price_short_horizon
      data_family:
        - price_only
        - price_plus_liquidity
      validation.initial_train_years:
        - 2
        - 3
      data_profile:
        - phase1_default
        - phase1_long_window
    predictive_gate:
      min_rank_ic: 0.01
      require_go_decision: true
      require_all_years_positive: true
      max_abs_placebo_ic: 0.10
      min_cost_stress_net_return: 0.0
    backtest_gate:
      min_net_return: 0.0
      require_cost_positive: true
    backtest_profile:
      name: phase2_free_data
