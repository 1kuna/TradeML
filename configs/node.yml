node:
  nas_mount: /mnt/trademl
  nas_share: //nas/trademl
  local_state: ~/trademl/control
  worker_id: rpi-01
  collection_time_et: '16:30'
  maintenance_hour_local: 2
  shard_count: 8
  lease_ttl_seconds: 90
  heartbeat_interval_seconds: 30
stage:
  current: 0
  stage_0:
    symbols: 100
    eod_years: 5
    green_promote_threshold: 0.98
  stage_1:
    symbols: 500
    eod_years: 10
    green_promote_threshold: 0.98
training:
  default_target: workstation-remote
training_targets:
  workstation-remote:
    kind: ssh
    host: 100.102.98.14
    user: openclaw
    port: 22
    repo_root: /Users/openclaw/TradeML
    data_root: /Users/openclaw/atlas_mounts/nas
    python_executable: /Users/openclaw/TradeML/.venv/bin/python
    password_env: TRADEML_WORKSTATION_REMOTE_PASSWORD
collection:
  saturation:
    enabled: true
    target_utilization: 0.98
  observability:
    enabled: true
    vendor_underutilized_after_minutes: 10
    dataset_stale_after_minutes: 1440
    scheduler_decision_retention_hours: 24
    resource_warn_thresholds:
      disk_percent: 90
  source_policy:
    states:
      - AVAILABLE
      - STALE
      - ZERO_COVERAGE
      - ENTITLEMENT_UNAVAILABLE
      - SOURCE_UNAVAILABLE
      - DISABLED_BY_POLICY
      - SCHEMA_MISMATCH
    known_unavailable_sources:
      fundamentals_tiingo: free_plan_empty_source
  freshness_policy:
    dataset_stale_after_minutes:
      ticker_news: 720
      equities_minute: 120
      alpaca_market_events: 240
      sec_filings: 2880
      fundamentals_tiingo: 10080
  compaction_policy:
    enabled: true
    max_partitions_per_run: 10
    datasets:
      - ticker_news
      - equities_minute
      - alpaca_market_events
  universe_policy: tiered_expansion
  retention_policy: watermarked_indefinite
  storage_watermark:
    warn_percent: 85
    pause_low_priority_percent: 92
vendors:
  alpaca:
    rpm: 200
    daily_cap: 288000
    reset_timezone: UTC
    minute_lane_enabled: true
    research_lane_priority: 205
    daily_cap_source: rpm_x_1440_no_documented_daily_cap
    datasets:
    - equities_eod
    - equities_minute
    - news
    role: primary_bars
  tiingo:
    rpm: 158
    daily_cap: 95000
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 211
    daily_cap_source: existing_config_live_calibration_required
    datasets:
    - equities_eod
    - corp_actions_dividends
    - corp_actions_splits
    - fundamentals
    - supported_tickers
    - news
    role: deep_history_bars
  twelve_data:
    rpm: 8
    daily_cap: 800
    reset_timezone: UTC
    minute_lane_enabled: true
    research_lane_priority: 207
    daily_cap_source: documented_basic_credits
    datasets:
    - equities_eod
    - equities_minute
    - dividends
    - splits
    - earnings_calendar
    - financial_statements
    - stocks
    role: cross_validation
  massive:
    rpm: 5
    daily_cap: 7200
    reset_timezone: UTC
    minute_lane_enabled: true
    research_lane_priority: 209
    daily_cap_source: documented_basic_calls_per_minute
    datasets:
    - equities_eod
    - equities_minute
    - reference_tickers
    - reference_splits
    - reference_dividends
    role: cross_validation_bars
  finnhub:
    rpm: 57
    daily_cap: 82080
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 215
    daily_cap_source: existing_config_live_calibration_required
    datasets:
    - equities_eod
    - earnings_calendar
    - company_profile
    - company_news
    role: backup_bars
  alpha_vantage:
    rpm: 1
    daily_cap: 25
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 280
    daily_cap_source: documented_free_requests_per_day
    datasets:
    - corp_actions
    - listings
    - news_sentiment
    role: reference
  fred:
    rpm: 114
    daily_cap: 164160
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 225
    daily_cap_source: existing_config_no_daily_cap
    datasets:
    - macros_treasury
    role: macro
  fmp:
    rpm: 1
    daily_cap: 250
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 270
    daily_cap_source: documented_basic_calls_per_day
    datasets:
    - delistings
    - symbol_changes
    - earnings_calendar
    - fundamentals
    - stock_news
    - press_releases
    role: reference
  sec_edgar:
    rpm: 600
    daily_cap: 864000
    reset_timezone: UTC
    minute_lane_enabled: false
    research_lane_priority: 230
    daily_cap_source: sec_fair_access_10_requests_per_second
    datasets:
    - filing_index
    role: authoritative_events
